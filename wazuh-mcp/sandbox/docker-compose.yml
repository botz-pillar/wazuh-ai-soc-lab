# Wazuh single-node sandbox for AI-CSL Course 09 Lesson 5.
#
# Brings up Wazuh Manager + Indexer + Dashboard on a 16GB laptop in ~3-8 min
# (first pull). Manager API exposed on localhost:55000 so the student's MCP
# server can reach it without networking complexity.
#
# Setup:
#   cp .env.example .env       # required — credentials live in .env
#   docker compose up -d       # start (first pull is slow)
#   ./seed-alerts.sh           # seed sample + poisoned alerts for the harness
#
# Pinned to Wazuh 4.7.x (verify https://hub.docker.com/u/wazuh before bumping).

name: wazuh-mcp-sandbox

services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.5
    hostname: wazuh.manager
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "127.0.0.1:55000:55000"  # manager REST API — bound to localhost only
      - "127.0.0.1:1514:1514"     # agent enrollment (not used in default lab)
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=${WAZUH_API_USER}
      - API_PASSWORD=${WAZUH_API_PASSWORD}
    volumes:
      - manager_api_configuration:/var/ossec/api/configuration
      - manager_etc:/var/ossec/etc
      - manager_logs:/var/ossec/logs
      - manager_queue:/var/ossec/queue
      - manager_var_multigroups:/var/ossec/var/multigroups
      - manager_integrations:/var/ossec/integrations
      - manager_active_response:/var/ossec/active-response/bin
      - manager_agentless:/var/ossec/agentless
      - manager_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
    networks:
      - wazuh-net
    healthcheck:
      # Manager is healthy when its API answers auth requests.
      test: >
        sh -c '
          curl -fsk -X POST -u "$$API_USERNAME:$$API_PASSWORD"
            https://localhost:55000/security/user/authenticate
          | grep -q token
        '
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    depends_on:
      wazuh.indexer:
        condition: service_healthy

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.7.5
    hostname: wazuh.indexer
    restart: unless-stopped
    mem_limit: 1500m
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "INDEXER_PASSWORD=${INDEXER_PASSWORD}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - indexer_data:/var/lib/wazuh-indexer
    networks:
      - wazuh-net
    healthcheck:
      test: >
        sh -c '
          curl -fsk -u "admin:$$INDEXER_PASSWORD"
            https://localhost:9200/_cluster/health
          | grep -q -E "(yellow|green)"
        '
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.7.5
    hostname: wazuh.dashboard
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "127.0.0.1:5601:5601"  # web UI — http://localhost:5601
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
    volumes:
      - dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
      - dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    networks:
      - wazuh-net
    depends_on:
      wazuh.indexer:
        condition: service_healthy

volumes:
  manager_api_configuration:
  manager_etc:
  manager_logs:
  manager_queue:
  manager_var_multigroups:
  manager_integrations:
  manager_active_response:
  manager_agentless:
  manager_wodles:
  filebeat_etc:
  filebeat_var:
  indexer_data:
  dashboard_config:
  dashboard_custom:

networks:
  wazuh-net:
    name: wazuh-mcp-sandbox-net
    driver: bridge
